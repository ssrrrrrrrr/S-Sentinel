apiVersion: v1
kind: ConfigMap
metadata:
  name: release-rollout-watcher-config
  namespace: slo-rollout
  labels:
    app.kubernetes.io/name: release-rollout-watcher
    project: slo-rollout-demo
data:
  config.yaml: |
    interval: 10s
    healthAddr: ":8080"
    repoDir: /app
    stateFile: /app/docs/release-reports/go-rollout-watcher-state.json
    ollamaUrl: http://192.168.30.1:11434
    model: qwen2.5:3b

    targets:
      - namespace: slo-rollout
        rollout: demo-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-rollout-watcher
  namespace: slo-rollout
  labels:
    app.kubernetes.io/name: release-rollout-watcher
    project: slo-rollout-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: release-rollout-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: release-rollout-watcher
        project: slo-rollout-demo
    spec:
      serviceAccountName: release-rollout-watcher
      containers:
        - name: watcher
          image: 192.168.30.11:5000/release-rollout-watcher:v1.15
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          command:
            - /app/watcher/release-rollout-watcher
          args:
            - --config
            - /app/watcher/config.yaml
          volumeMounts:
            - name: watcher-config
              mountPath: /app/watcher/config.yaml
              subPath: config.yaml
            - name: release-reports
              mountPath: /app/docs/release-reports
      volumes:
        - name: watcher-config
          configMap:
            name: release-rollout-watcher-config
        - name: release-reports
          persistentVolumeClaim:
            claimName: release-rollout-watcher-reports-nfs
