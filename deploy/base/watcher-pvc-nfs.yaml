apiVersion: v1
kind: PersistentVolume
metadata:
  name: release-rollout-watcher-reports-nfs
  labels:
    app.kubernetes.io/name: release-rollout-watcher
    project: slo-rollout-demo
    storage-type: nfs
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: watcher-nfs
  nfs:
    server: 192.168.30.11
    path: /data/nfs/slo-rollout-watcher/reports
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: release-rollout-watcher-reports-nfs
  namespace: slo-rollout
  labels:
    app.kubernetes.io/name: release-rollout-watcher
    project: slo-rollout-demo
    storage-type: nfs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: watcher-nfs
  resources:
    requests:
      storage: 1Gi
