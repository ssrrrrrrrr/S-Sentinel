apiVersion: v1
kind: ServiceAccount
metadata:
  name: release-rollout-watcher
  namespace: slo-rollout
  labels:
    app.kubernetes.io/name: release-rollout-watcher
    project: slo-rollout-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: release-rollout-watcher-readonly
  labels:
    app.kubernetes.io/name: release-rollout-watcher
    project: slo-rollout-demo
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - rollouts
      - analysisruns
      - analysistemplates
      - applications
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - ""
    resources:
      - pods
      - events
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - apps
    resources:
      - replicasets
      - deployments
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - monitoring.coreos.com
    resources:
      - prometheusrules
      - servicemonitors
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: release-rollout-watcher-readonly
  labels:
    app.kubernetes.io/name: release-rollout-watcher
    project: slo-rollout-demo
subjects:
  - kind: ServiceAccount
    name: release-rollout-watcher
    namespace: slo-rollout
roleRef:
  kind: ClusterRole
  name: release-rollout-watcher-readonly
  apiGroup: rbac.authorization.k8s.io
