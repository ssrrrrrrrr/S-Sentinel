name: Release Demo App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag / release tag"
        required: true
        default: "v1-actions"
      app_version:
        description: "App version"
        required: true
        default: "v1"
      fault_rate:
        description: "Fault rate"
        required: true
        default: "0"
      latency_ms:
        description: "Latency ms"
        required: true
        default: "0"
      slo_error_rate_threshold:
        description: "SLO error-rate threshold (%)"
        required: true
        default: "5"
      slo_p95_seconds_threshold:
        description: "SLO p95 latency threshold (seconds)"
        required: true
        default: "0.3"
      slo_min_request_count:
        description: "SLO minimum request count (per 1m window)"
        required: true
        default: "20"

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Show environment
        run: |
          cd "$GITHUB_WORKSPACE"
          pwd
          git status
          go version
          python3 --version
          kubectl version --client
          ctr version

      - name: Configure git
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Run GitOps release script
        env:
          SLO_ERROR_RATE_THRESHOLD: "${{ github.event.inputs.slo_error_rate_threshold }}"
          SLO_P95_SECONDS_THRESHOLD: "${{ github.event.inputs.slo_p95_seconds_threshold }}"
          SLO_MIN_REQUEST_COUNT: "${{ github.event.inputs.slo_min_request_count }}"
          PROM_ADDR: "http://10.102.31.98:9090"
        run: |
          cd "$GITHUB_WORKSPACE/demo-app"
          chmod +x release-gitops.sh
          ./release-gitops.sh \
            "${{ github.event.inputs.image_tag }}" \
            "${{ github.event.inputs.app_version }}" \
            "${{ github.event.inputs.fault_rate }}" \
            "${{ github.event.inputs.latency_ms }}"

      - name: Push GitOps manifest changes
        run: |
          cd "$GITHUB_WORKSPACE"
          git push origin main

      - name: Sync local working repository
        continue-on-error: true
        run: |
          echo "Sync /root/slo-rollout-demo with origin/main"

          if [ -d /root/slo-rollout-demo/.git ]; then
            git -C /root/slo-rollout-demo fetch origin main

            if ! git -C /root/slo-rollout-demo pull --ff-only origin main; then
              echo "WARN: local repo diverged, resetting mirror to origin/main"
              git -C /root/slo-rollout-demo checkout main
              git -C /root/slo-rollout-demo reset --hard origin/main
            fi
          else
            echo "/root/slo-rollout-demo is not a git repository, skip sync"
          fi
